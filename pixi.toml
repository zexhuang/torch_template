[workspace]
name = "geoai"
channels = ["conda-forge"]
platforms = ["linux-64"]

[system-requirements]
# Forces conda-forge to resolve GPU-aware binaries where applicable
cuda = "12.8"

[tasks]
# Custom shortcuts you can run via `pixi run <task_name>`
jupyter = "lab"

[dependencies]
# --- Core Python & Scientific ---
python = "3.12.*"
cmake = "3.27.*"
pytorch = { version = "*", build = "cuda*" }
torchvision = { version = "*", build = "cuda*" }
torchaudio = { version = "*", build = "cuda*" }
pytorch3d = { version = "*", build = "cuda*" }
scikit-learn = "*"
numba = "*"
scipy = "*"
pandas = "*"
jupyterlab = "*"
ipykernel = "*"
ipywidgets = "*"
pyyaml = "*"
pycocotools = "*"
tqdm = "*"
docutils = ">=0.20,<0.22"
pytest = "*"
botocore = "*"

# --- Geospatial Core (Heavy C++) ---
gdal = "*"
pdal = "*"
python-pdal = "*"
geopandas = "*"
shapely = "*"
fiona = "*"
pyproj = "*"
rtree = "*"
h3-py = "*"
pysal = "*"
esda = "*"
momepy = "*"
spopt = "*"
osmnx = "*"
rasterio = "*"
rioxarray = "*"
rio-tiler = "*"
xarray-spatial = "*"
geocube = "*"
stackstac = "*"
rio-cogeo = "*"
pyrosm = "*"

# --- 3D Processing & Visualization ---
trimesh = "*"
PyMCubes = "*"
pymeshlab = "*"
pyvista = "*"
trame = "*"
plyfile = "*"
open3d = "*"
matplotlib = "*"
seaborn = "*"
folium = "*"

[pypi-dependencies]
# --- ML Ops & HuggingFace ---
lightning = "*"
torchinfo = "*"
torchmetrics = "*"
accelerate = "*"
einops = "*"
wandb = "*"
tensorboard = "*"
hydra-core = "*"
torchgeo = "*"
rs-embed = "*"
geotessera = ">=0.9.0"
kornia = "*"
datasets = "*"
transformers = "*"
tokenizers = "*"
eurostat = "*"

# --- TDA & Spatial Geometry ---
city2graph = "*"
torch_topological = "*"
tadasets = "*"
toponetx = "*"
gudhi = "*"
ripser =  "*"
persim = "*"
laspy = "*"
lazrs = "*"
startinpy = "*"
fast-simplification = "*"

# --- PyG Extensions ---
torch_geometric = "*"
pyg_lib = "*"
torch_scatter = "*"
torch_sparse = "*"
torch_cluster = "*"

# --- LLMs & Agents ---
ollama = "*"
langgraph = "*"
langchain = "*"
deepagents  = "*"

[pypi-options]
extra-index-urls = ["https://pypi.org/simple"]
find-links = [{url = "https://data.pyg.org/whl/torch-2.10.0+cu128.html"}]
