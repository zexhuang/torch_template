name: geoai
channels:
  - conda-forge
  - defaults
dependencies:
  # --- Core Python ---
  - python=3.11
  - cmake=3.27

  # --- Scientific & Data ---           
  - scikit-learn
  - numba                      
  - scipy
  - pandas
  - jupyterlab
  - ipykernel
  - ipywidgets
  - pyyaml
  - pycocotools
  - tqdm    

  # --- Geospatial Core (Strictly Conda: Heavy C++) ---
  - gdal
  - pdal
  - python-pdal
  - geopandas
  - shapely           
  - fiona
  - pyproj
  - rtree
  - h3-py
  - pysal
  - esda
  - momepy
  - spopt
  - osmnx
  - rasterio
  - rioxarray
  - rio-tiler
  - xarray-spatial
  - geocube
  - stackstac

  # --- 3D Processing & Visualization ---
  - trimesh
  - pymeshlab
  - pyvista
  - trame
  - plyfile
  - open3d
  - matplotlib
  - seaborn
  - folium        

  # --- Pip Managed ---
  - pip
  - pip:
      # --- PyTorch Ecosystem (CUDA 12.8) ---
      - "--extra-index-url https://download.pytorch.org/whl/cu128"
      - torch==2.10.0
      - torchvision
      - torchaudio
      - torchinfo
      - torchgeo
      - torchmetrics
      - lightning

      # --- PyG Core & C++ Extensions ---
      - "--find-links https://data.pyg.org/whl/torch-2.10.0+cu128.html"
      - torch_geometric
      - pyg_lib
      - torch_scatter
      - torch_sparse
      - torch_cluster

      # --- HuggingFace & ML Ops ---
      - accelerate
      - einops
      - wandb
      - tensorboard
      - datasets
      - transformers
      - tokenizers
      - hydra-core
      - kornia
      
      # --- Pip Libs ---
      - city2graph
      - TorchSpatial
      - giotto-tda
      - topomodelx
      - torch_topological
      - tadasets
      - toponetx
      - gudhi
      - persim
      - laspy
      - lazrs
      - startinpy
      - fast-simplification
