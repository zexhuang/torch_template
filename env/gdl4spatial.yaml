name: geoai
channels:
  - conda-forge
  - defaults
dependencies:
  # --- Core Python ---
  - python=3.12
  - cmake=3.27

  # --- Geospatial Core (C++ Libs included) ---
  - gdal
  - pdal
  - python-pdal
  - geopandas
  - shapely            
  - fiona
  - pyproj
  - rtree
  - pysal
  - momepy
  - spopt
  - osmnx
  - city2graph
  - rasterio
  - rioxarray
  - rio-tiler
  - xarray-spatial
  - geocube
  - stackstac

  # --- Geo Vis ---
  - folium
  - mapclassify
  - contextily
  - datashader
  - geoplot
  - matplotlib          

  # --- Scientific & Data ---
  - numba
  - scipy
  - scikit-learn
  - seaborn
  - pandas
  - ipykernel
  - pyyaml
  - pycocotools
  - tqdm                

  # --- 3D Processing ---
  - trimesh
  - pymeshlab
  - pyvista
  - plyfile
  - open3d

  # --- Pip Fallback ---
  - pip
  - pip:
      # --- Index Options ---
      - "--extra-index-url https://download.pytorch.org/whl/cu126"
      - "--find-links https://data.pyg.org/whl/torch-2.8.0+cu126.html"

      # --- PyTorch Core (Pinned) ---
      - torch==2.8.0
      - torchvision
      - torchaudio
      - torchgeo
      - torchinfo
      - torchmetrics

      # --- GDL ---
      # PyG
      - torch_geometric
      - pyg_lib
      - torch_scatter
      - torch_sparse
      - torch_cluster
      - torch_spline_conv

      # --- TDA ---
      - gudhi
      - giotto-tda
      - torch_topological
      - tadasets
      - toponetx
      - persim

      # --- ML Ops & Config ---
      - wandb
      - tensorboard
      - lightning
      - accelerate
      - hydra-core          

      # --- HuggingFace ---
      - datasets
      - transformers
      - tokenizers

      # --- Point Cloud Tools ---
      - laspy
      - lazrs
      - startinpy
      - fast-simplification
